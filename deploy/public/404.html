<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>页面未找到 · 乐伴好眠</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #2c3e50;
      background: linear-gradient(165deg, #e8f4f0 0%, #f5f0e8 45%, #eef2f8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      width: 100%;
      text-align: center;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 48px 32px 40px;
      box-shadow: 0 12px 40px rgba(44, 90, 78, 0.08);
    }
    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: linear-gradient(145deg, #7ec8b8, #5a9e8f);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      line-height: 1;
      color: #fff;
    }
    .code {
      font-size: 56px;
      font-weight: 200;
      letter-spacing: 4px;
      color: #5a9e8f;
      line-height: 1;
      margin-bottom: 8px;
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #1a2e28;
    }
    p {
      font-size: 14px;
      line-height: 1.7;
      color: #5c6b7a;
      margin-bottom: 8px;
    }
    .hint {
      font-size: 13px;
      color: #8a9aa8;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(90, 158, 143, 0.15);
    }
    .brand {
      margin-top: 28px;
      font-size: 13px;
      color: #5a9e8f;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" aria-hidden="true">♪</div>
    <div class="code">404</div>
    <h1>这段旋律走丢了</h1>
    <p>您访问的地址不存在，或资源已迁移。</p>
    <p>官方曲库音频请使用小程序播放；勿直接打开带 <code style="font-size:12px">.mp3</code> 后缀的旧链接。</p>
    <p class="hint">乐伴好眠 · music.zsyl.cc</p>
    <p class="brand">请返回微信小程序继续使用</p>
  </div>
</body>
</html>
